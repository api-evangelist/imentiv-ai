      properties:
        title:
          type: string
          minLength: 1
          title: Title
          description: A descriptive title for your audio (e.g., 'Customer Call' or 'Team Meeting').
        description:
          type: string
          title: Description
          description: Optional notes about the audio content or context.
        media_url:
          type: string
          title: Media Url
          description: URL to your audio/video source (YouTube, Instagram, Twitter, Facebook, Dropbox, or any direct media
            link). Audio will be extracted if source is video. Leave empty if uploading a file instead.
          default: ''
        start_millis:
          type: number
          title: Start Millis
          description: Start point in milliseconds to begin analysis. Use 0 to start from the beginning. If provided (>0),
            end_millis is required with minimum 1-second (1000ms) gap.
          default: 0
        end_millis:
          type: number
          title: End Millis
          description: End point in milliseconds to stop analysis. Use 0 only when analyzing the full audio (start_millis
            must also be 0). If start_millis is provided, end_millis is required and must be at least 1000ms greater than
            start_millis.
          default: 0
        callback_url:
          type: string
          title: Callback Url
          description: Your webhook URL to receive a notification when analysis completes.
          default: ''
        audio_file:
          title: Audio File
          description: Upload an audio file directly (mp3, wav, aac, m4a). File upload takes priority over media_url.
        speaker_diarization:
          type: boolean
          title: Speaker Diarization
          description: Speaker diarization. Enabled by default.
          default: true
        text_emotion_analysis:
          type: boolean
          title: Text Emotion Analysis
          description: Text emotion analysis. Enabled by default.
          default: true
        language:
          anyOf:
          - type: string
          - type: 'null'
          title: Language
          description: Language code for analysis. Auto-detected if not provided.
      type: object
      required:
      - title
      title: Body_upload_audio_v2_audios_post
