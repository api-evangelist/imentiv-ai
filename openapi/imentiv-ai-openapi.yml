tags:
- name: Video Emotion API
  description: "The Video Emotion Analysis API by Imentiv analyzes the emotional states of individuals in a video. It performs\
    \ multi-modal emotion detection using facial expressions, audio, and text transcript, and has the following features:\n\
    \n- Overall emotion summary\n- Frame-by-frame emotion data\n- Per-face emotional analysis\n- Valence-arousal-intensity\
    \ data\n- Audio and transcript emotion data\n- Personality analysis\n- Video Highlights\n- Optional psychological insights\n\
    \            "
- name: Image Emotion API
  description: "The Image Emotion Recognition API by Imentiv analyzes human facial expressions in an image and returns the\
    \ detected emotions. It can detect multiple faces and evaluate each face's emotional state, providing detailed emotional\
    \ labels such as happy, sad, angry, neutral, surprise, disgust, fear, and contempt.\n            "
- name: Audio Emotion API
  description: "The Audio Emotion Analysis API processes audio files or YouTube URLs to analyze emotions and transcripts.\
    \ The API provides:\n\n**Speaker Diarization:** Identifies and segments audio by speakers.\n\n**Audio Emotion Analysis:**\
    \ Detects one of 8 emotions per audio segment.\n\n**Text Emotion Analysis:** Generates a transcript for each segment and\
    \ detects one of 28 emotions from the text.\n            "
- name: Text Emotion API
  description: "The Text Emotion Analysis API by Imentiv analyzes a given piece of text and returns the detected emotional\
    \ tone(s).\n\n**Features:**\n- The API processes the text, detects emotions for each paragraph, and returns results.\n\
    - A callback mechanism is supported for asynchronous analysis.\n- **Supported emotions (28):** Admiration, Amusement,\
    \ Approval, Caring, Desire, Excitement, Gratitude, Joy/Happy, Love, Optimism, Pride, Relief, Anger, Disappointment, Annoyance,\
    \ Disapproval, Disgust, Embarrassment, Fear, Grief, Nervousness, Remorse, Sadness, Confusion, Curiosity, Realization,\
    \ Surprise, Neutral\n            "
- name: Report API
  description: "The Report API provides comprehensive emotion analysis reports in PDF format for analyzed media content.\n\
    \n**Features:**\n- Generate detailed PDF reports for video emotion analysis\n- Includes visual charts, emotion timelines,\
    \ and insights\n- Supports asynchronous report generation with callback notifications\n- Retrieve existing reports or\
    \ trigger new generation\n\n**Use Cases:** Ideal for creating shareable analysis reports, documentation of emotional insights,\
    \ and presentation-ready materials.\n            "
- name: AI Insights API
  description: "The AI Insights API provides conversational AI-powered analysis of emotional data from your media content.\n\
    \n**Features:**\n- Ask natural language questions about detected emotions, patterns, and trends\n- Receive AI-generated\
    \ insights with real-time streaming (SSE)\n- Conversation continuity across multiple messages\n- Works with all media\
    \ types: video, audio, image, and text\n\n**Endpoints:**\n- `POST /v2/{media_type}/{media_id}/ai-insights` - Send a message\
    \ and receive AI response (streaming recommended)\n- `GET /v2/{media_type}/{media_id}/ai-insights` - Retrieve conversation\
    \ history\n\n**Use Cases:** Ideal for gaining deeper insights into emotional patterns, generating summaries, comparing\
    \ emotional states, and understanding sentiment trends in your media content.\n            "
