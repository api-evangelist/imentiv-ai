openapi: 3.1.0
info:
  title: Welcome to Imentiv AI
  description: "# Welcome to Imentiv AI\n\nImentiv AI is an advanced Emotion AI platform that leverages deep learning to analyze\
    \ human emotions across multiple media formats, including video, audio, images, and text. By interpreting facial expressions,\
    \ vocal tones, and linguistic cues, it provides detailed emotional insights to support use cases such as content creation,\
    \ marketing optimization, education, mental health assessments, and more.\n\nImentiv AI offers a suite of Emotion Recognition\
    \ APIs that allow developers and businesses to seamlessly integrate advanced emotion analysis into their applications,\
    \ enabling deeper insights into user engagement and emotional responses.\n\n## Key Features of Imentiv AI APIs\n\n###\
    \ 1. Video Emotion API\n**Functionality:** Analyzes emotions in videos, whether uploaded directly or via YouTube links.\n\
    \n**Insights Provided:**\n- Frame-by-frame and actor-by-actor emotion analysis\n- Valence-arousal mapping to determine\
    \ emotional intensity and positivity/negativity\n- Personality trait analysis using the Big Five (OCEAN) model\n- Emotion\
    \ graphs and wheels to visualize emotional dynamics\n\n**Use Cases:** Suitable for researchers analyzing bulk videos,\
    \ advertising campaigns, webinars, online meetings, and other video-based content to optimize engagement and content strategy.\n\
    \n### 2. Image Emotion API\n**Functionality:** Detects and analyzes emotions in images.\n\n**Insights Provided:**\n- Face\
    \ detection and recognition\n- Emotion analysis for each detected face\n- Overall emotional tone of the image\n\n**Use\
    \ Cases:** Enhances image analysis for advertising, market research, psychological studies, and social media content.\n\
    \n### 3. Audio Emotion API\n**Functionality:** Analyzes emotions in audio recordings, either via direct uploads or by\
    \ extracting audio from YouTube videos.\n\n**Insights Provided:**\n- Differentiation between multiple speakers in a conversation\n\
    - Emotion detection from vocal cues (e.g., happiness, sadness, anger, surprise)\n- Transcription and detection of up to\
    \ 28 nuanced emotions (e.g., admiration, curiosity, disappointment, pride)\n- Audio summaries and detailed analytics\n\
    \n**Use Cases:** Provides emotional insights for podcasts, voice messages, call analysis, and other audio-based content.\n\
    \n### 4. Text Emotion API\n**Functionality:** Analyzes emotions in textual content.\n\n**Insights Provided:**\n- Detection\
    \ of 28 distinct emotions, including curiosity, disappointment, and excitement\n- Overall sentiment analysis and identification\
    \ of dominant emotions at sentence level\n\n**Use Cases:** Integrates into chatbots, social media platforms, and other\
    \ text-based applications for sentiment and emotion analysis.\n\n---\n\n## Authorization\n\nLearn how to obtain your API\
    \ keys to access Imentiv AI APIs.\n\n### Generate API Key:\n\n1. **Sign up** at [imentiv.ai](https://imentiv.ai) and log\
    \ in to your account.\n2. Navigate to the **'My Profile'** tab to obtain your API key.\n3. Use this API key to authorize\
    \ your API calls.\n\n> **Note:** Keep your API key secure and do not share it publicly. Include it in your API requests\
    \ using the `Authorization` header or as specified in the endpoint documentation.\n        "
  version: 1.0.0
paths:
  /v2/videos:
    post:
      tags:
      - Video Emotion API
      summary: Upload Video
      description: 'Analyze emotions and facial expressions from video content.


        Submit a video from multiple sources and receive detailed emotion analysis

        of all detected faces throughout the video timeline.


        **Input Sources:**

        - **YouTube**: Provide any YouTube video URL

        - **Cloud Storage**: Dropbox, Google Drive, or other cloud service links

        - **Social Media**: Instagram, Facebook, Twitter (X) videos

        - **Direct URL**: Any publicly accessible video link

        - **File Upload**: Upload video files directly from your device


        **Analyze Specific Segments:**

        Focus on specific portions using `start_millis` and `end_millis` parameters.

        This helps target key moments and optimize credit usage.


        **How It Works:**

        1. Submit your video and receive an immediate response with a video ID

        2. Video is queued for processing (typically completes within minutes)

        3. Optionally receive a webhook notification via `callback_url` when complete

        4. Retrieve results using the video ID


        **Supported Formats:**

        MP4, AVI, MOV, WebM, MPEG


        **Credit Usage:**

        Processing time is billed based on the analyzed video duration.'
      operationId: upload_video_v2_videos_post
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_upload_video_v2_videos_post'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoEmotionResponseV2'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - APIKeyHeader: []
  /v1/videos:
    get:
      tags:
      - Video Emotion API
      summary: List Videos
      description: Retrieves a paginated list of uploaded video files associated with the authenticated user.
      operationId: list_videos_v1_videos_get
      security:
      - APIKeyHeader: []
      parameters:
      - name: offset_video_id
        in: query
        required: false
        schema:
          type: string
          description: The ID of the reference video from which to paginate forward/backward
          title: Offset Video Id
        description: The ID of the reference video from which to paginate forward/backward
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          description: 'Number of results to return (default: 10)'
          default: 10
          title: Page Size
        description: 'Number of results to return (default: 10)'
      - name: direction
        in: query
        required: false
        schema:
          type: string
          description: 'Pagination direction: forward (default) or backward'
          default: forward
          title: Direction
        description: 'Pagination direction: forward (default) or backward'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
