  /v2/videos/{video_id}/emotions/average:
    get:
      tags:
      - Video Emotion API
      summary: Get Average Emotions
      description: 'Calculate and retrieve average emotion scores for a video with optional face filtering.


        This endpoint computes the average emotion percentages across all frames in a video.

        When a face_id is provided, it calculates the average emotions for only that specific face.


        **Behavior:**

        - **Without face_id**: Returns overall average emotion score for entire video (all faces combined)

        - **With face_id**: Calculates average emotion scores for the specified face


        **Parameters:**

        - `video_id`: Unique identifier for the video

        - `face_id`: (Optional) Calculate average emotions for only this face ID


        **Response:**

        Returns emotion scores as percentages (values sum to 1.0):

        - `angry`: Percentage of anger emotion

        - `disgust`: Percentage of disgust emotion

        - `fear`: Percentage of fear emotion

        - `happy`: Percentage of happiness emotion

        - `sad`: Percentage of sadness emotion

        - `surprise`: Percentage of surprise emotion

        - `neutral`: Percentage of neutral emotion


        **Use Cases:**

        - **Overall video analysis**: Understand the general emotional tone of the entire video

        - **Individual tracking**: Track emotional patterns of specific people throughout the video

        - **Comparative analysis**: Compare emotional profiles between different faces in the same video


        **Example Usage:**

        - Overall average: `GET /v2/videos/123/emotions/average`

        - Face-specific: `GET /v2/videos/123/emotions/average?face_id=1`


        **Note:** Face-specific calculations require the face to appear in at least one frame.'
      operationId: get_average_emotions_v2_videos__video_id__emotions_average_get
      security:
      - APIKeyHeader: []
      parameters:
      - name: video_id
        in: path
        required: true
        schema:
          type: string
          description: The unique video ID of the video for which average emotions are to be calculated
          title: Video Id
        description: The unique video ID of the video for which average emotions are to be calculated
      - name: face_id
        in: query
        required: false
        schema:
          type: integer
          description: Optional face ID to calculate average emotions for a specific face
          title: Face Id
        description: Optional face ID to calculate average emotions for a specific face
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmotionScores'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v2/videos/{video_id}/annotated_video:
    get:
      tags:
      - Video Emotion API
      summary: Get Annotated Video
      description: "Get annotated video with emotion labels and bounding boxes overlaid on each frame.\n\n**How It Works:**\n\
        - First request initiates video generation and returns a status response\n- Poll this endpoint to check generation\
        \ progress\n- When ready, returns a secure signed URL for downloading the video\n\n**Response Types:**\n\n1. **Status\
        \ Response** (JSON) - While generating:\n   ```json\n   {\n     \"video_id\": \"abc123\",\n     \"message\": \"Annotated\
        \ video is currently being generated...\",\n     \"status\": \"pending\"\n   }\n   ```\n\n2. **Signed URL Response**\
        \ (JSON) - When complete:\n   ```json\n   {\n     \"video_id\": \"abc123\",\n     \"download_url\": \"https://storage.googleapis.com/...\"\
        ,\n     \"filename\": \"My_Video_abc123.mp4\",\n     \"expires_in_minutes\": 60,\n     \"expires_at\": \"2026-01-09T12:00:00Z\"\
        ,\n     \"note\": \"Download URL will expire. Request a new URL if expired.\"\n   }\n   ```\n\n**Parameters:**\n-\
        \ `video_id`: Video identifier\n- `callback_url`: Optional webhook URL to receive notification when generation completes\n\
        \n**Prerequisites:**\nVideo analysis must be complete before requesting annotated video.\n\n**Security:**\n- New videos\
        \ are stored privately and require signed URLs for access\n- Signed URLs expire after 60 minutes for security\n- Old\
        \ videos may use public URLs (backward compatibility)\n\n**Example Workflow:**\n\n```python\n# 1. Request annotated\
        \ video (with optional callback URL)\nGET /v2/videos/abc123/annotated_video?callback_url=https://example.com/webhook\n\
        Response: {\"status\": \"pending\", \"message\": \"...\"}\n\n# 2. Check status (poll until ready)\nGET /v2/videos/abc123/annotated_video\n\
        Response: {\"status\": \"in progress\", \"message\": \"...\"}\n\n# 3. Get download URL when ready\nGET /v2/videos/abc123/annotated_video\n\
        Response: {\"video_id\": \"abc123\", \"download_url\": \"https://...\", ...}\n\n# 4. Download video from the signed\
        \ URL\nGET <download_url>\n```"
      operationId: get_annotated_video_v2_videos__video_id__annotated_video_get
      security:
      - APIKeyHeader: []
      parameters:
      - name: video_id
        in: path
        required: true
        schema:
          type: string
          description: The unique video ID of the video
          title: Video Id
        description: The unique video ID of the video
      - name: callback_url
        in: query
        required: false
        schema:
          type: string
          description: Optional callback URL to notify when annotated video generation is complete
          default: ''
          title: Callback Url
        description: Optional callback URL to notify when annotated video generation is complete
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                anyOf:
                - $ref: '#/components/schemas/SignedDownloadUrlResponse'
                - $ref: '#/components/schemas/AnnotatedVideoResponse'
                title: Response Get Annotated Video V2 Videos  Video Id  Annotated Video Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
