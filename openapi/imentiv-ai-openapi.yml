  /v2/videos/{video_id}/speaker-face-match:
    put:
      tags:
      - Video Emotion API
      summary: Update Speaker Face Match
      description: "Manually match detected faces to identified speakers with bidirectional name synchronization.\n\nThis\
        \ endpoint enables client-driven multimodal person identification by allowing you to manually\nspecify which detected\
        \ faces (from video analysis) correspond to which identified speakers \n(from audio analysis). Each mapping synchronizes\
        \ identity information across video and audio \nmodalities while managing personality analysis data.\n\n## Features\n\
        \n- **Face-to-Speaker Mapping**: Links face IDs (from video) to speaker IDs (from audio)\n- **Bidirectional Name Sync**:\
        \ Automatically synchronizes names between faces and speakers\n- **Duplicate Prevention**: Validates that each face\
        \ and speaker is mapped only once\n- **Personality Data Cleanup**: Clears existing personality analysis when mappings\
        \ change\n- **Batch Operations**: Process multiple mappings in a single request\n\n## Name Synchronization\n\nThe\
        \ `name` field in each mapping supports bidirectional synchronization:\n\n- **Empty/null name** (`\"\"` or `null`):\
        \ Fetches the speaker's name from the audio document\n  and applies it to the face\n- **Provided name** (e.g., `\"\
        Alice\"`): Updates both the face name AND the speaker name\n  in their respective documents\n\nThis ensures consistency\
        \ across audio and video data while giving you control over\nwhether to use existing speaker names or provide new\
        \ ones.\n\n## Request Body\n\n```json\n{\n  \"mappings\": [\n    {\n      \"face_id\": 1,\n      \"speaker_id\": 0,\n\
        \      \"name\": \"Alice Johnson\"\n    },\n    {\n      \"face_id\": 2,\n      \"speaker_id\": 1,\n      \"name\"\
        : \"\"\n    }\n  ]\n}\n```\n\nEach mapping object contains:\n- `face_id` (int, required): ID of detected face from\
        \ video analysis\n- `speaker_id` (int, required): ID of identified speaker from audio analysis\n- `name` (string,\
        \ optional): Person's name for synchronization\n\n## Response\n\nReturns a confirmation response:\n```json\n{\n  \"\
        status\": \"completed\",\n  \"message\": \"Speaker-face matching completed successfully\"\n}\n```\n\n## Prerequisites\n\
        \n- Video must be in \"completed\" status\n- Video must have associated audio document (multimodal analysis)\n- Face\
        \ IDs must exist in the video's face detections\n- Speaker IDs must exist in the audio's speaker identifications\n\
        \n## Use Cases\n\n1. **Manual Initial Matching**: Manually map speakers to faces after video processing completes\n\
        2. **Name Updates**: Update names while preserving analysis data\n3. **Correction of Auto-Matching**: Override or\
        \ correct automatic face-to-speaker associations\n4. **Custom Mappings**: Specify mappings based on client-side knowledge\
        \ or user input\n5. **Prepare for Personality Analysis**: Define mappings before triggering personality analysis\n\
        6. **Batch Processing**: Map multiple face-speaker pairs in a single API call\n\n## Validation Rules\n\n- ✅ Each `face_id`\
        \ must appear only once in the request (no duplicate faces)\n- ✅ Each `speaker_id` must appear only once in the request\
        \ (no duplicate speakers)\n- ✅ All `face_id` values must exist in the video document\n- ✅ All `speaker_id` values\
        \ must exist in the audio document\n- ✅ User must own the video (admin users can access any video)\n\n## Important\
        \ Notes\n\n- **Manual Operation**: This endpoint requires the client to explicitly provide all \n  face-to-speaker\
        \ mappings. For automatic AI-driven matching, use the POST endpoint.\n- **Personality Data**: When mappings are created\
        \ or updated, any existing\n  personality analysis data for those faces is cleared and must be re-analyzed\n- **Audio\
        \ Document Updates**: If you provide names, the audio document's speaker\n  names are automatically updated to match\n\
        - **Idempotent**: Calling this endpoint multiple times with the same mappings\n  will update the entities (not create\
        \ duplicates)\n\n## Example Scenarios\n\n### Scenario 1: Create New Mappings\n```json\nPUT /v2/videos/abc123/speaker-face-match\n\
        {\n  \"mappings\": [\n    {\"face_id\": 1, \"speaker_id\": 0, \"name\": \"Alice\"},\n    {\"face_id\": 2, \"speaker_id\"\
        : 1, \"name\": \"Bob\"}\n  ]\n}\n```\n\n### Scenario 2: Use Existing Speaker Names\n```json\nPUT /v2/videos/abc123/speaker-face-match\n\
        {\n  \"mappings\": [\n    {\"face_id\": 1, \"speaker_id\": 0, \"name\": \"\"},\n    {\"face_id\": 2, \"speaker_id\"\
        : 1, \"name\": \"\"}\n  ]\n}\n```\nNames will be fetched from the audio document's speaker records.\n\n### Scenario\
        \ 3: Update Names\n```json\nPUT /v2/videos/abc123/speaker-face-match\n{\n  \"mappings\": [\n    {\"face_id\": 1, \"\
        speaker_id\": 0, \"name\": \"Alice Johnson\"}\n  ]\n}\n```\nUpdates both the face name and speaker name to \"Alice\
        \ Johnson\".\n\n## Error Responses\n\n- **400 Bad Request**: Empty mappings, duplicate face/speaker IDs, or missing\
        \ audio ID\n- **401 Unauthorized**: Missing authentication\n- **403 Forbidden**: User doesn't own the video\n- **404\
        \ Not Found**: Face ID or speaker ID not found in respective documents\n- **422 Unprocessable Entity**: Video processing\
        \ not completed"
      operationId: update_speaker_face_match_v2_videos__video_id__speaker_face_match_put
      security:
      - APIKeyHeader: []
      parameters:
      - name: video_id
        in: path
        required: true
        schema:
          type: string
          description: Unique identifier of the video. Video must be in 'completed' status with associated audio analysis.
          title: Video Id
        description: Unique identifier of the video. Video must be in 'completed' status with associated audio analysis.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/SpeakerFaceMatchRequest'
              description: 'List of face-to-speaker mappings. Each mapping contains: face_id (detected face from video), speaker_id
                (identified speaker from audio), and optional name. Name behavior: empty/null fetches from speaker; provided
                value updates both face and speaker. Validates against duplicate face_id and speaker_id values.'
              title: Mappings
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpeakerFaceMatchResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - Video Emotion API
      summary: Trigger Speaker Face Match
      description: "Trigger automatic AI-driven speaker-to-face matching for a video.\n\nThis endpoint initiates an asynchronous\
        \ process that automatically matches\nspeakers from the audio analysis to faces detected in the video using AI.\n\n\
        \n## Prerequisites\n\n- User must be the video owner or an admin\n- Video must be in 'completed' status\n- Audio must\
        \ be in 'completed' status\n- Video must have an associated audio_id\n\n## Response\n\n```json\n{\n  \"video_id\"\
        : \"abc123\",\n  \"audio_id\": \"xyz789\",\n  \"status\": \"processing\",\n  \"message\": \"Speaker-face match worker\
        \ triggered successfully\"\n}\n```\n\n## Error Responses\n\n- **401 Unauthorized**: User is not authenticated or not\
        \ authorized to access this video\n- **404 Not Found**: Video not found\n- **409 Conflict**: Video or audio processing\
        \ not completed\n- **400 Bad Request**: Audio ID missing in video document"
      operationId: trigger_speaker_face_match_v2_videos__video_id__speaker_face_match_post
      security:
      - APIKeyHeader: []
      parameters:
      - name: video_id
        in: path
        required: true
        schema:
          type: string
          description: Unique identifier of the video. Video must be in 'completed' status with associated audio.
          title: Video Id
        description: Unique identifier of the video. Video must be in 'completed' status with associated audio.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutoSpeakerFaceMatchTriggerResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v2/videos/{video_id}/personality/analyze:
    post:
      tags:
      - Video Emotion API
      summary: Trigger Personality Analysis
      description: "Trigger personality analysis for a specific face in a video.\n\nInitiates asynchronous personality trait\
        \ assessment based on facial expressions and,\nwhen available, vocal characteristics from linked audio speaker data.\n\
        \n## Analysis Types\n\n- **overall**: Analyzes personality traits across the entire video\n- **by_segment**: Analyzes\
        \ personality traits by time segments\n- **combined**: Performs both overall and segment analysis\n\nOverall and segment\
        \ analyses are independent - triggering one does not affect the other.\n\n## Multimodal Analysis\n\n- **Face only**:\
        \ Analyzes facial expressions when no speaker is linked\n- **Face + Audio**: Combines facial and vocal characteristics\
        \ when face is linked to a speaker\n\n## Prerequisites\n\n- Video must be completed\n- Face ID must exist in the video\n\
        - If face has speaker mapping: audio must be completed\n- User must have sufficient credits\n\n## Request\n\n```json\n\
        {\n  \"face_id\": 1,\n  \"analysis_type\": \"overall\",\n  \"callback_url\": \"https://example.com/webhook\"\n}\n\
        ```\n\n## Response\n\n```json\n{\n  \"video_id\": \"abc123\",\n  \"face_id\": 1,\n  \"speaker_id\": 2,\n  \"analysis_type\"\
        : \"overall\",\n  \"status\": \"processing\",\n  \"message\": \"Personality analysis triggered successfully\"\n}\n\
        ```\n\n## Notes\n\n- Analysis runs asynchronously in the background\n- Use callback_url for webhook notifications\
        \ when complete\n- Credits are deducted when analysis is triggered\n- Retrieve results using the video analytics endpoints"
      operationId: trigger_personality_analysis_v2_videos__video_id__personality_analyze_post
      security:
      - APIKeyHeader: []
      parameters:
      - name: video_id
        in: path
        required: true
        schema:
          type: string
          description: Unique identifier of the video. Video must be in 'completed' status with detected faces.
          title: Video Id
        description: Unique identifier of the video. Video must be in 'completed' status with detected faces.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Body_trigger_personality_analysis_v2_videos__video_id__personality_analyze_post'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonalityTriggerResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
